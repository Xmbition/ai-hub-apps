name: Release - PyPI
run-name: Release - ${{ inputs.target == 'prod' && 'PyPI' || 'test PyPI' }}


env:
  PYTHON_VERSION: '3.10'
  PYTHONUNBUFFERED: 1

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
      inputs:
          target:
              required: true
              type: choice
              default: staging
              description: Release Target
              options:
              - staging
              - prod
  workflow_call:
      inputs:
          target:
              required: true
              type: string
          skip_approval:
            required: false
            type: boolean
            default: false

jobs:
  approve:
    if: ${{ !inputs.skip_approval && inputs.target == 'prod' }}
    name: Approve Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - run: echo "Release approved"

  release_pypi:
      name: Release to ${{ inputs.target == 'prod' && 'PyPI' || 'test PyPI' }}
      needs: [approve]
      if: ${{ !cancelled() && (needs.approve.result == 'success' || needs.approve.result == 'skipped') }}
      runs-on: [tetra-ubuntu-2204, self-hosted]
      env:
        VENV_PATH: qaiha-dev
        CLI_EGG_INFO_DIR: "cli/qai_hub_apps.egg-info"
      steps:
      - name: Verify running on a tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then
            echo "Error: This workflow must be run from a tag, got ${{ github.ref }}"
            exit 1
          fi

      - uses: actions/checkout@v6
      - id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup AWS Credentials
        uses: ./.github/actions/configure-multiple-aws-roles
        with:
          role-to-assume: ${{ secrets.QAIHA_CI_AWS_ROLE_ARN }}
          role-duration-seconds: 7200
          profile: qaihm
          aws-region: us-west-2

      - name: Install Deps
        env:
            SUDO_PASSWORD: ${{ secrets.TETRASERVICE_PASSWORD }}
        run: |
            bash tools/setup_env.sh --python="${{ steps.setup_python.outputs.python-path }}" --venv="${{ env.VENV_PATH }}"

      - name: Generate registry.yaml
        run: |
          source ${{ env.VENV_PATH }}/bin/activate
          python -m qai_hub_apps_test.scripts.generate_registry --output_dir cli/qai_hub_apps/ --build_and_upload --ref ${{ github.ref_name }}

      - name: Build wheels
        run: |
          source ${{ env.VENV_PATH }}/bin/activate
          pip install build
          rm -rf ${{env.CLI_EGG_INFO_DIR}}
          rm -f cli/build/wheel/*.whl

          # strip leading 'v' — SETUPTOOLS_SCM_PRETEND_VERSION is used verbatim, unlike normal tag parsing
          VERSION="${{ github.ref_name }}"

          # this is required because after the registry.yaml is generated, the working tree is dirty and setuptools_scm generates a dev version
          SETUPTOOLS_SCM_PRETEND_VERSION="${VERSION#v}" python -m build --wheel --outdir cli/build/wheel/ cli/

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ inputs.target == 'prod' && secrets.PYPI_TOKEN || secrets.TEST_PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.target == 'prod' && 'https://upload.pypi.org/legacy/' || 'https://test.pypi.org/legacy/' }}
        run: |
          source ${{ env.VENV_PATH }}/bin/activate
          pip install twine
          WHEELS="cli/build/wheel/*.whl"
          twine upload --verbose $WHEELS
