##
## QAI Hub Apps Nightly Tests
##

name: QAI Hub Apps Nightly

on:
    # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      platform:
        description: Application Platform to Test
        required: false
        type: string
        default: all
      notify_failure:
        description: Notify Slack Channel
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 9 * * *' # 1am PDT

jobs:
  precommit_check:
    secrets: inherit
    uses: ./.github/workflows/build-and-test.yaml
    with:
      do_all: true
      scheduled: true

  test_android_app:
    secrets: inherit
    name: "Test All Android Apps"
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'android' }}
    uses: ./.github/workflows/android.yaml
    with:
      run_tests: true
      build_docker: true
      docker_tag: commit_sha

  test_windows_app:
    secrets: inherit
    name: "Test All Windows Apps"
    if: ${{ (inputs.platform || 'all') == 'all' || (inputs.platform || 'all') == 'windows' }}
    uses: ./.github/workflows/windows.yaml
    with:
      run_tests: true
      build_docker: true
      docker_tag: commit_sha

  test_website_import:
    secrets: inherit
    name: "Test Website Import"
    uses: ./.github/workflows/release_website.yaml
    with:
      source_branch_name: main
      models_branch_name: main
      create_pr: false
      import_models: true

  notify_failure:
    if: ${{ failure() && (github.event_name == 'schedule' || inputs.notify_failure) }}
    name: Notify Failure
    needs: [precommit_check, test_android_app, test_windows_app, test_website_import]
    runs-on: [tetra-ubuntu-2204, self-hosted]
    permissions:
        contents: read
        issues: write
        actions: read

    steps:
      - name: Create GitHub Issue
        id: create-github-issue
        uses: actions/github-script@v8.0.0
        with:
          github-token: ${{ secrets.STAGING_GH_TOKEN }}
          script: |
            const today = new Date().toISOString().split('T')[0];
            // Define job information
            const jobs = {
              'precommit_check': {
                name: 'Pre-commit Hook Rules Check',
                result: '${{ needs.precommit_check.result }}',
                url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/'
              },
              'test_android_app': {
                name: 'Test Android App',
                result: '${{ needs.test_android_app.result }}',
                url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/'
              },
              'test_windows_app': {
                name: 'Test Windows App',
                result: '${{ needs.test_windows_app.result }}',
                url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/'
              },
              'test_website_import': {
                name: 'Test Website Import',
                result: '${{ needs.test_website_import.result }}',
                url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/'
              },
            };
            // Build failed jobs list
            let failedJobsList = '';
            let hasTestFailures = false;
            for (const [jobId, jobInfo] of Object.entries(jobs)) {
              if (jobInfo.result === 'failure') {
                failedJobsList += `- [${jobInfo.name}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (\`${jobId}\`)\n`;
                if (jobId.startsWith('test_')) {
                  hasTestFailures = true;
                }
              }
            }
            // Build issue body
            let issueBody = `# 🚨 QAI Hub Apps Nightly Tests Failed
            Date: ${today}
            ## Links
            - [View Workflow Run Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }})
            ## Next Steps
            1. Check the workflow summary tab for detailed error messages and stack traces
            2. Determine appropriate ML Tech Team member for assignment of issue
            3. Review individual job logs for specific failure causes
            4. 📊 [Update the Nightly Failure Log spreadsheet](https://qualcomm.sharepoint.com/:x:/r/teams/TetraAI2/Shared%20Documents/model-zoo/QAIHA%20Nightly%20Failure%20Log.xlsx?d=w95a2e41217ca4026ac7bb2f9520b9bfd&csf=1&web=1&e=yhlaKv&nav=MTVfezNBMTU5NDhFLUE4QTYtNzE0Qy1CMERGLTg4RkRCRDQ1MDFGMn0)
            ## Failed Jobs
            ${failedJobsList}
            `;
            if (hasTestFailures) {
              issueBody += `
            ## Common Causes for Test Job Failures
            **Check the individual job logs for:**
            - Package installation errors (pip/uv timeouts)
            - Import errors or missing dependencies
            - Environment variable issues
            - Platform-specific build failures
            `;
            }
            issueBody += `## Workflow Info
            - Source Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Triggered by: ${{ github.event_name }}
            ---
            Auto-created by nightly workflow failure notification`;
            const result = await github.rest.issues.create({
              owner: 'qcom-ai-hub',
              repo: 'tetracode',
              title: `QAI Hub Apps Nightly Tests Failed - ${today}`,
              body: issueBody,
              labels: ['p0', 'ai-hub-apps'],
              assignees: ['manupill_QCOM']
            });
            console.log(`Created consolidated issue: ${result.data.html_url}`);
            // Set output for Slack notification
            core.setOutput('issue_url', result.data.html_url);

      # Send result to Slack channel #ai-hub-apps
      - name: Send Slack Notification
        id: slack_notification
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
          payload: |
            channel: "C08KWAVBQNB"
            text: |
              🚨 QAI Hub Apps Nightly Failed
              Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
              GitHub Issue: ${{ steps.create-github-issue.outputs.issue_url }}
