schema_version: '1.0'
min_cli_version: 0.0.1
apps:
- name: Whisper Windows
  id: whisper_windows_py
  status: published
  headline: Bring speech-to-text on device for Windows
  description: A sample CLI app demonstrating how to run Whisper, a state-of-the-art speech-to-text solution, using the ONNX execution provider. Designed for learning, it showcases efficient on-device processing optimized for the Snapdragon® Neural Processing Unit (NPU).
  domain: Audio
  use_case: Speech Recognition
  app_repo_url: https://github.com/qualcomm/ai-hub-apps/tree/main/apps/whisper_windows_py
  app_type: windows
  runtime: onnx
  related_models:
  - whisper_base
  precisions:
  - float
  model_file_path: models
- name: MediaPipe Hand Gesture Recognition
  id: mediapipe_hand_gesture_ubuntu
  status: published
  headline: On-device hand gesture recognition with TFLite
  description: A sample app for Ubuntu integrating the MediaPipe Hand Gesture recognition model via TFLite Runtime. It leverages GStreamer for input video and provides a minimal web interface to stream output frames suitable for embedded applications.
  domain: Computer Vision
  use_case: Object Detection
  app_repo_url: https://github.com/qualcomm/ai-hub-apps/tree/main/apps/mediapipe_hand_gesture_ubuntu
  app_type: ubuntu
  runtime: tflite
  related_models:
  - mediapipe_hand_gesture
  precisions:
  - float
  model_file_path: models
- name: Stable Diffusion Windows
  id: stable_diffusion_windows_py
  status: published
  headline: Text-to-image generation on Snapdragon® NPUs
  description: A sample CLI Windows app for image generation from text descriptions using Stable Diffusion. It leverages the ONNX execution provider to optimize processing on the Snapdragon® Neural Processing Unit (NPU), making it an excellent learning tool for AI-driven creative applications on Windows.
  domain: Generative AI
  use_case: Image Generation
  app_repo_url: https://github.com/qualcomm/ai-hub-apps/tree/main/apps/stable_diffusion_windows_py
  app_type: windows
  runtime: precompiled_qnn_onnx
  related_models:
  - stable_diffusion_v2_1
  precisions:
  - w8a16
  model_file_path: models
